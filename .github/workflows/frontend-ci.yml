name: Frontend CI

on:
  pull_request:
    branches:
      - main
      - staging
      - develop-main
      - develop-staging

jobs:
  build:
    name: Build Vue frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
